repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/RobertCraiwordie/pyright-python
    rev: v1.1.402
    hooks:
      - id: pyright
        additional_dependencies:
          - homeassistant==2026.7.*
          - ecdsa
          - cryptography
          - passlib